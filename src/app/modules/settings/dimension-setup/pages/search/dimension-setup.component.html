<div class="grid grid-cols-1 gap-4">
  <div class="col">
    <h5 class="mb-4 font-semibold text-lg">Dimension Setup Management</h5>
  </div>
</div>
<!-- <app-quick-search [fields]="DimensionSetupFields" [actionButtons]="searchActionButtonsConfig" (searchEvent)="search($event)" (clearEvent)="clear()"
                                                                                                                                            [searchKey]="'DimensionSetup-search'" /> -->

<div class="card user-card mt-6">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>
  <p-table id="dtSearchDimensionSetupPagination" #dtDimensionSetup [value]="DimensionSetuppagination" [lazy]="true" (onLazyLoad)="onLazyLoad($event)"
                                                                                                                                              dataKey="dimensionSetupId"
                                                                                                                                              [paginator]="false"
                                                                                                                                              [showCurrentPageReport]="true"
                                                                                                                                              [columns]="columns"
                                                                                                                                              [rowHover]="true"
                                                                                                                                              [rows]="pageSize"
                                                                                                                                              [totalRecords]="totalRecords"
                                                                                                                                              currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
                                                                                                                                              [loading]="loading"
                                                                                                                                              [rowsPerPageOptions]="[5, 10, 25]"
                                                                                                                                              [tableStyle]="{ 'min-width': '50rem' }"
                                                                                                                                              styleClass="p-datatable-sm p-datatable-striped p-datatable-header-bgwhite"
                                                                                                                                              size="small"
                                                                                                                                              [stateStorage]="'local'"
                                                                                                                                              [stateKey]="'DimensionSetup-grid'"
                                                                                                                                              editMode="row">
    <ng-template pTemplate="header" let-columns>
      <tr>
        <th *ngFor="let col of columns ?? []" [pSortableColumn]="col.field" [pSortableColumnDisabled]="!col.sort"
                                                                                                                                                    [style.min-width]="col.width">
          {{ col.header }}
          <p-sortIcon [field]="col.field" [ngClass]="{ hidden: !col.sort }" pTooltip="Sort by {{ col.header }}"
                                                                                                                                                      tooltipPosition="top">
            <i class="p-sortable-column-icon pi pi-sort"></i>
          </p-sortIcon>
        </th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-rowData let-columns="columns" let-editing="editing">

      <tr [pEditableRow]="rowData" (dblclick)="onDoubleClickEdit(rowData, dtDimensionSetup)">
        <td *ngFor="let col of columns">
          <p-cellEditor>
            <ng-template #input>
              <ng-container [ngSwitch]="col.type">
                <ng-container *ngSwitchCase="'text'">
                  <input pInputText type="text" [(ngModel)]="rowData[col.field]" />
                </ng-container>
                <ng-container *ngSwitchCase="'checkbox'">
                  <p-checkbox [(ngModel)]="rowData[col.field]" binary="true"></p-checkbox>


                </ng-container>
                <ng-container *ngSwitchCase="'number'">
                  <input pInputText type="number" (input)="validateRange($event, rowData)" min="1" max="8"
                                                                                                                                                              [(ngModel)]="rowData[col.field]" />
                </ng-container>
                <ng-container *ngSwitchCase="'dropdown'">
                  <p-select class="w-full" styleClass="w-full" [options]="dimensionNamesOptions" optionLabel="label" optionValue="value" [(ngModel)]="rowData[col.field]"
                                                                                                                                                              [filter]="true"
                                                                                                                                                              filterBy="label"
                                                                                                                                                              [showClear]="false"
                                                                                                                                                              appendTo="body">
                  </p-select>
                </ng-container>
                <ng-container *ngSwitchCase="'label'">
                  {{ rowData[col.field] }}
                </ng-container>
              </ng-container>
            </ng-template>
            <ng-template #output>
              <ng-container [ngSwitch]="col.type">
                <ng-container *ngSwitchCase="'checkbox'">
                  <p-tag [value]="rowData[col.field] ? 'Yes' : 'No'" [severity]="rowData[col.field] ? 'success' : 'danger'">
                  </p-tag>
                </ng-container>
                <ng-container *ngSwitchCase="'text'">
                  {{ rowData[col.field] }}
                </ng-container>
                <ng-container *ngSwitchCase="'dropdown'">
                  {{ getDimensionCodeLabel(rowData[col.field]) }}
                </ng-container>
                <ng-container *ngSwitchCase="'number'">
                  {{ rowData[col.field] }}
                </ng-container>
                <ng-container *ngSwitchCase="'label'">
                  {{ rowData[col.field] }}
                </ng-container>
              </ng-container>
            </ng-template>
          </p-cellEditor>
        </td>
        <td>
          <div class="flex items-center justify-center gap-2">
            <button *ngIf="!editing" pButton pRipple type="button" pInitEditableRow icon="pi pi-pencil" (click)="onRowEditInit(rowData)" text rounded
                                                                                                                                                        severity="secondary"></button>
            <button *ngIf="editing" pButton pRipple type="button" pSaveEditableRow icon="pi pi-check" (click)="onRowEditSave(rowData)" text rounded
                                                                                                                                                        severity="secondary"></button>
            <button *ngIf="editing" pButton pRipple type="button" pCancelEditableRow icon="pi pi-times" (click)="onRowEditCancel(rowData, rowData['dimensionSetupId'])"
                                                                                                                                                        text
                                                                                                                                                        rounded
                                                                                                                                                        severity="secondary"></button>
          </div>
        </td>
      </tr>

      </div>
  </td> -->

  </p-table>

</div>
