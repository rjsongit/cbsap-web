<form [formGroup]="settingsForm" (ngSubmit)="onSubmit()">
  <p-confirmDialog [style]="{ width: '20vw', height: '200px' }" />

  <div class="card p-8 shadow-md rounded-2xl space-y-8 bg-white">
    <!-- Header -->
    <div
      class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
    >
      <h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2>
      <div class="flex gap-3">
        <p-button
          label="Save"
          icon="pi pi-check"
          [raised]="true"
          [rounded]="true"
          [severity]="!settingsForm.valid ? 'secondary' : 'primary'"
          type="submit"
        ></p-button>
      </div>
    </div>

    <p-divider></p-divider>

    <!-- Horizontal Form Fields -->
    <div class="space-y-6 sm:w-full md:w-2/3 xl:w-1/2">
      <div class="flex items-center">
        <!-- Label -->
        <label
          for="archiveDays"
          class="w-1/3 text-gray-700 flex flex-col font-semibold"
        >
          <span>Archive Invoices after how many days</span>
          <span class="text-blue-700 text-xs italic"
            >(*Maximum number of days 365)</span
          >
        </label>

        <!-- Input + validation -->
        <div class="w-2/3">
          <p-inputNumber
            id="archiveDays"
            formControlName="archiveDays"
            [useGrouping]="false"
            autocomplete="off"
            min="90"
            max="365"
            maxlength="31"
            appCharacterFocusTracker
            (focusChange)="onFocusChange('archiveDays', $any($event))"
          />
          <div
            class="mt-1 flex justify-between items-center text-xs text-gray-500"
          >
            <small
              *ngIf="f['archiveDays'].invalid && f['archiveDays'].touched"
              class="text-red-500"
            >
              {{
                getErrorMessage(f["archiveDays"], "Archive Invoice X of Days ")
              }}
            </small>
            <small
              *ngIf="focusStates['archiveDays'] && f?.['archiveDays']?.value"
            >
              <span
                *ngIf="
                  (f['archiveDays'].value! | characterLength : 80)
                    .approachingLimit
                "
                class="text-red-400"
              >
                Approaching limit!
              </span>
              {{ (f["archiveDays"].value! | characterLength : 100).length }}/40
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
