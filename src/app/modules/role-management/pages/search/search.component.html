<div class="grid grid-cols-1 gap-4">
  <div class="col">
    <h5 class="mb-4 font-semibold text-lg">Role Management</h5>
  </div>
</div>

<app-quick-search
  [fields]="roleSearchFields"
  [addButtonLabel]="'Add Role'"
  (searchEvent)="search($event)"
  (clearEvent)="clear()"
  (exportEvent)="exportExcel()"
  (addEvent)="newRole()"
  [actionButtons]="searchActionButtonsConfig"
  [searchKey]="'role-search'"     
></app-quick-search>

<div class="card user-card mt-6">
  <p-table
    #dtRoles
    [value]="rolespagination"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    dataKey="RoleID"
    [paginator]="true"
    [showCurrentPageReport]="true"
    [columns]="columns"
    [rowHover]="true"
    [rows]="pageSize"
    [totalRecords]="totalRecords"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [loading]="loading"
    [rowsPerPageOptions]="[5, 10, 25]"
    [tableStyle]="{ 'min-width': '50rem' }"
    styleClass="p-datatable-sm p-datatable-striped p-datatable-header-bgwhite"
    size="small"
    [stateStorage]="'local'"
    [stateKey]="'role-grid'"        
  >
    <ng-template pTemplate="header">
      <tr>
        <!--<th>Action</th>-->
        <th *ngFor="let col of columns" [pSortableColumn]="col.sort ? col.field : undefined">
          {{ col.header }}
          <p-sortIcon
            *ngIf="col.sort"
            [field]="col.field"
            pTooltip="Sort by {{ col.header }}"
            tooltipPosition="top"
          ></p-sortIcon>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-rowData let-columns="columns">
      <tr [pSelectableRow]="rowData" (dblclick) = "editRole(rowData)">
        <!--<td>
          <button
            class="p-button p-button-secondary p-button-rounded p-button-text"
            icon="pi pi-pencil"
            pButton
            pRipple
            type="button"
            (click)="editRole(rowData)"
          ></button>
        </td>-->

        <td *ngFor="let col of columns; trackBy: trackByFn" [ngSwitch]="col.field">
          <ng-container *ngSwitchCase="'permissionGroups'">
            <span *ngIf="isExcelPermissionGroup">
              {{ rowData[col.field] }}
            </span>
            <p-button
              label="Show"
              variant="text"
              icon="pi pi-cog"
              severity="info"
              (click)="op2.toggle($event); getpermissionByRole(rowData.roleID)"
            >
            </p-button>
            <p-overlayPanel #op2 [showCloseIcon]="true" [style]="{ width: '250px' }">
              <ng-template pTemplate>
                <p-table
                  [value]="rolePermission"
                  selectionMode="single"
                  [paginator]="true"
                  [rows]="5"
                  (onRowSelect)="op2.hide()"
                  [columns]="permissionGroupColumns"
                  styleClass="p-datatable-sm p-datatable-striped text-xs"
                >
                  <ng-template pTemplate="header">
                    <tr>
                      <th
                        *ngFor="let col of permissionGroupColumns"
                        [pSortableColumn]="col.field"
                      >
                        {{ col.header }}
                        <p-sortIcon
                          [field]="col.field"
                          pTooltip="Sort by {{ col.header }}"
                          tooltipPosition="top"
                        ></p-sortIcon>
                      </th>
                    </tr>
                  </ng-template>
                  <ng-template
                    pTemplate="body"
                    let-permissionGroupData
                    let-columns="permissionGroupColumns"
                  >
                    <tr>
                      <td *ngFor="let col of permissionGroupColumns">
                        {{ permissionGroupData[col.field] }}
                      </td>
                    </tr>
                  </ng-template>
                </p-table>
              </ng-template>
            </p-overlayPanel>
          </ng-container>

          <ng-container *ngSwitchCase="'isActive'">
            <p-tag [value]="rowData[col.field] | yesno" [severity]="rowData[col.field] ? 'success' : 'danger' "></p-tag>
          </ng-container>

          <ng-container *ngSwitchDefault>
            {{ rowData[col.field] }}
          </ng-container>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">
          <div class="flex items-center justify-center font-bold text-center">
            No roles found.
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
