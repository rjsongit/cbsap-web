<div class="p-4">
  <span
    class="text-base font-semibold text-gray-700 mb-4 flex items-center gap-2"
  >
    {{ promptMsg }}
  </span>

  <ul class="divide-y divide-gray-200 max-h-64 overflow-auto">
    <li
      *ngFor="let msg of messages"
      class="p-4 bg-gray-50 hover:bg-gray-100 transition rounded flex items-start gap-3"
    >
      <i
        class="pi"
        [ngClass]="{
          'pi-check text-green-500': msg.includes('for approval'),
          'pi-times-circle text-red-500': !msg.includes('for approval')
        }"
        style="font-size: 1.25rem"
      ></i>

      <span class="text-gray-800 text-sm leading-relaxed">{{ msg }}</span>
    </li>
  </ul>
</div>
<div class="mt-4 text-right">
  <div class="p-dialog-footer">
    <p-button
      label="Yes"
      icon="pi  pi-check"
      [raised]="true"
      [rounded]="true"
      (click)="force()"
      *ngIf="forceButtonVisible() && !getHasMissingRoutingFlow()"
    />
    <p-button
      label="No"
      icon="pi pi-times"
      [raised]="true"
      [rounded]="true"
      severity="contrast"
      (click)="continue()"
    />
  </div>
</div>
