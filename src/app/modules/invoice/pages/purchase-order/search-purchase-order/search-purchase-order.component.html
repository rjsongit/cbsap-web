<!-- Search Form Container -->
<div class="p-4 border rounded bg-white">
  <div class="p-4 bg-white rounded space-y-4">
    <div *ngFor="let row of fieldRows" class="flex gap-4">
      <div *ngFor="let field of row" class="flex flex-col w-1/3">
        <label class="mb-2" [for]="field.key">{{ field.label }}</label>

        <ng-container [ngSwitch]="field.type">
          <input
            *ngSwitchCase="'text'"
            pInputText
            [type]="field.type"
            class="p-inputtext p-component w-full"
            [(ngModel)]="filters[field.key]"
            [id]="field.key.toString()"
          />
          <p-datepicker
            *ngSwitchCase="'date'"
            size="small"
            [showIcon]="true"
            dateFormat="dd/mm/yy"
            styleClass="w-full"
            inputStyleClass="w-full"
            [(ngModel)]="filters[field.key]"
            [id]="field.key.toString()"
            appendTo="body"
          />

          <p-checkbox
            *ngSwitchCase="'bool'"
            [(ngModel)]="filters[field.key]"
            [id]="field.key.toString()"
            binary="true"
            [ngModelOptions]="{ standalone: true }"
          ></p-checkbox>
        </ng-container>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-2">
      <p-button
        label="Search"
        icon="pi pi-search"
        size="small"
        rounded="true"
        (click)="search()"
      />
      <p-button
        label="Clear"
        icon="pi pi-refresh"
        size="small"
        rounded="true"
        (click)="clear()"
      />
      <p-button
        label="Cancel"
        icon="pi pi-ban"
        size="small"
        severity="contrast"
        rounded="true"
        (click)="cancel()"
      />
    </div>
  </div>
</div>
