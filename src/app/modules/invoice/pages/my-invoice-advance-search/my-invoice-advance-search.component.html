<form [formGroup]="invInfoForm">
  <p-panel [toggleable]="true" styleClass="mb-4 panel-items">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <!-- <i class="pi pi-ellipsis-v"></i> -->
        <span class="font-bold">Supplier Information</span>
      </div>
    </ng-template>

    <input id="advanceSearchId" type="hidden" formControlName="advanceSearchId"/>
    <div class="p-4">
      <div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6  mb-2">
          <div class="grid grid-cols-12 items-center gap-2">
            <input type="hidden" formControlName="supplierInfoID" />
            <label for="supplierName" class="col-span-12 md:col-span-4 font-medium">Supplier Name</label>
            <div class="col-span-12 md:col-span-8">
              <p-inputgroup>
                <input id="supplierName" type="text" pInputText formControlName="supplierName" size="small" class="w-full"
                                                                                                                                                            [ngClass]="{ 'readonly-input': true }" />
                <p-inputgroup-addon>
                  <p-button variant="text" severity="secondary" icon="pi pi-search" size="small"
                                                                                                                                                              (click)="assignSupplier()" />
                </p-inputgroup-addon>
              </p-inputgroup>
            </div>
          </div>
          <div class="grid grid-cols-12 items-center gap-2">
            <label for="paymentTerm" class="col-span-12 md:col-span-4 font-medium">Payment Term</label>
            <div class="col-span-12 md:col-span-8">
              <p-select formControlName="paymentTerm" [options]="invInfoDropdown['paymentTerms']" class="w-full" appendTo="body">
              </p-select>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
          <div class="grid grid-cols-12 items-center gap-2 ">
            <label for="supplierNo" class="col-span-12 md:col-span-4 font-medium">Supplier Number</label>
            <div class="col-span-12 md:col-span-8">
              <input id="supplierNo" type="text" pInputText formControlName="supplierNo" class="w-full"/>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
          <div class="grid grid-cols-12 items-center gap-2 ">
            <label for="suppABN" class="col-span-12 md:col-span-4 font-medium">Supplier Tax ID</label>
            <div class="col-span-12 md:col-span-8">
              <input id="suppABN" type="text" pInputText formControlName="suppABN" class="w-full" />
            </div>
          </div>
          <div class="grid grid-cols-12 items-center gap-2">
            <label for="suppBankAccount" class="col-span-12 md:col-span-4 font-medium">Supplier Bank Account</label>
            <div class="col-span-12 md:col-span-8">
              <input id="suppBankAccount" type="text" pInputText formControlName="suppBankAccount" class="w-full" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </p-panel>
  <p-panel [toggleable]="true" [collapsed]="true" styleClass="mb-4 panel-items">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span class="font-bold">Invoice Details</span>
      </div>
    </ng-template>
    <div class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="entity" class="col-span-12 md:col-span-4 font-medium">Entity</label>
          <div class="col-span-12 md:col-span-8">
            <p-select class="w-full" formControlName="entityProfileID" [options]="entityOptions" [filter]="true" filterBy="label" [showClear]="false"
                                                                                                                                                        appendTo="body">
            </p-select>
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="poNo" class="col-span-12 md:col-span-4 font-medium">Purchase Order No</label>
          <div class="col-span-12 md:col-span-8">
            <p-inputgroup>
              <input id="poNo" type="text" pInputText formControlName="poNo" class="w-full"
                                                                                                                                                          [ngClass]="{ 'readonly-input': true }" />
              <p-inputgroup-addon>
                <p-button variant="text" severity="secondary" icon="pi pi-search" size="small"
                                                                                                                                                            (click)="assignPurchaseOrder()">
                </p-button>
              </p-inputgroup-addon>
            </p-inputgroup>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6  mb-2">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="invoiceNo" class="col-span-12 md:col-span-4 font-medium">Invoice No</label>
          <div class="col-span-12 md:col-span-8">
            <input id="invoiceNo" type="text" pInputText formControlName="invoiceNo" class="w-full" />
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">

        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="invoiceDate" class="col-span-12 md:col-span-4 font-medium">Invoice Date
          </label>
          <div class="col-span-12 md:col-span-8 w-full">
            <p-datepicker formControlName="dateRangeInvoiceDate" selectionMode="range" [readonlyInput]="true" [showIcon]="true" dateFormat="dd/mm/yy" styleClass="w-full"
                                                                                                                                                        inputStyleClass="w-full"
                                                                                                                                                        appendTo="body" />
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="email" class="col-span-12 md:col-span-4 font-medium">Due Date</label>
          <div class="col-span-12 md:col-span-8">
            <p-datepicker formControlName="dateRangeDueDate" selectionMode="range" [readonlyInput]="true" [showIcon]="true" dateFormat="dd/mm/yy" styleClass="w-full"
                                                                                                                                                        inputStyleClass="w-full"
                                                                                                                                                        appendTo="body" />
          </div>
        </div>

      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-1">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="grNo" class="col-span-12 md:col-span-4 font-medium">Days till Due</label>
          <div class="col-span-12 md:col-span-8">
            <p-inputnumber formControlName="daysTillDue" inputId="daysTillDue"  [useGrouping]="false" class="w-full" />
          </div>
        </div>
      </div>
    </div>
  </p-panel>
  <p-panel [toggleable]="true" [collapsed]="true" styleClass="mb-4 panel-items">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span class="font-bold">Invoice Amounts</span>
      </div>
    </ng-template>
    <div class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-1">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="netAmount" class="col-span-12 md:col-span-4 font-medium">Net Amount</label>
          <div class="col-span-12 md:col-span-8 ">
            <p-inputnumber formControlName="netAmount" inputId="netAmount" mode="decimal" [minFractionDigits]="2" class="w-full" (onInput)="onAmountsChange()"
                                                                                                                                                        inputStyleClass="w-full text-right"
                                                                                                                                                         />
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2 mb-1">
          <label for="taxCode" class="col-span-12 md:col-span-4 font-medium">Tax Code</label>
          <div class="col-span-12 md:col-span-8">
            <p-select class="w-full" formControlName="taxCodeID" [options]="taxCodeOptions" [filter]="true" filterBy="label"
                                                                                                                                                        [showClear]="false">
            </p-select>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-1">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="taxAmount" class="col-span-12 md:col-span-4 font-medium">Tax Amount</label>
          <div class="col-span-12 md:col-span-8">
            <p-inputnumber formControlName="taxAmount" inputId="taxAmount" mode="decimal" [minFractionDigits]="2" class="w-full" (onInput)="onAmountsChange()"
                                                                                                                                                        appendTo="body"
                                                                                                                                                        inputStyleClass="w-full text-right" />
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="currency" class="col-span-12 md:col-span-4 font-medium">Currency</label>
          <div class="col-span-12 md:col-span-8">
            <p-select formControlName="currency" appendTo="body" [options]="invInfoDropdown['currencies']"
                                                                                                                                                        class="w-full">
            </p-select>
          </div>
        </div>

      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="totalAmount" class="col-span-12 md:col-span-4 font-medium">Total Amount</label>
          <div class="col-span-12 md:col-span-8">
            <p-inputnumber formControlName="totalAmount" inputId="totalAmount" mode="decimal" [minFractionDigits]="2" class="w-full" (onInput)="onAmountsChange()"
                                                                                                                                                        inputStyleClass="w-full text-right"
                                                                                                                                                         />
          </div>

        </div>
      </div>
    </div>
  </p-panel>
  <p-panel [toggleable]="true" [collapsed]="true" styleClass="mb-4 panel-items">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span class="font-bold">Workflow Routing</span>
      </div>
    </ng-template>
    <div class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
        <div class="grid grid-cols-12 items-center gap-2">
          <label class="col-span-12 md:col-span-4 font-medium">Routing Flow Name</label>
          <!--<div class="col-span-12 md:col-span-8">
            <input type="text" disabled  pInputText  class="w-full" [value]="routingFlowName" />
          </div>-->
          <div class="col-span-12 md:col-span-8">
            <p-inputgroup>
              <input id="invRoutingFlowName" type="text" pInputText formControlName="invRoutingFlowName" class="w-full" readonly
                                                                                                                                                          [ngClass]="{ 'readonly-input': true }" />
              <p-inputgroup-addon>
                <p-button variant="text" severity="secondary" icon="pi pi-search" size="small"
                                                                                                                                                            (click)="assignRoutingFlow()">
                </p-button>
              </p-inputgroup-addon>
            </p-inputgroup>
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">
          <label class="col-span-12 md:col-span-4 font-medium">Next Role</label>
          <div class="col-span-12 md:col-span-8">
            <input type="text" pInputText class="w-full" id="nextRole" formControlName="nextRole" />
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="note" class="col-span-12 md:col-span-4 font-medium">Keyword</label>
          <div class="col-span-12 md:col-span-8">
            <p-inputgroup>
              <input id="keyword" type="text" pInputText formControlName="keyword" readonly class="w-full"
                                                                                                                                                          [ngClass]="{ 'readonly-input': true }" />
              <p-inputgroup-addon>
                <p-button variant="text" severity="secondary" icon="pi pi-search" size="small"
                                                                                                                                                            (click)="assignKeyword()">
                </p-button>
              </p-inputgroup-addon>
            </p-inputgroup>
          </div>
        </div>
      </div>
    </div>
  </p-panel>
  <p-panel [toggleable]="true" [collapsed]="true" styleClass="mb-4 panel-items">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span class="font-bold">Transaction Information</span>
      </div>
    </ng-template>
    <div class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="mapID" class="col-span-12 md:col-span-4 font-medium">MAP ID</label>
          <div class="col-span-12 md:col-span-8">
            <input id="mapID" type="text" pInputText formControlName="mapID" class="w-full" />
          </div>
        </div>
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="scanDate" class="col-span-12 md:col-span-4 font-medium">Scan Date</label>
          <div class="col-span-12 md:col-span-8">
            <p-datepicker formControlName="dateRangeScanDate" selectionMode="range" [showIcon]="true" [readonlyInput]="true" daterangepicker dateFormat="dd/mm/yy"
                                                                                                                                                        styleClass="w-full"
                                                                                                                                                        inputStyleClass="w-full"
                                                                                                                                                        appendTo="body" />
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-1">
        <div class="grid grid-cols-12 items-center gap-2">
          <label for="invoiceID" class="col-span-12 md:col-span-4 font-medium">Invoice ID</label>
          <div class="col-span-12 md:col-span-8">
            <input id="invoiceID" type="text" pInputText formControlName="invoiceID" class="w-full" />
          </div>
        </div>

      </div>
    </div>
  </p-panel>

  <div clas="p-4">
    <div class="flex flex-col sm:flex-row flex-wrap gap-4 mt-6 w-full">
      <div>

      </div>
    </div>


  </div>


  <div class="grid grid-cols-1 md:grid-cols-2 items-center gap-4">
    <!-- LEFT -->
    <div class="flex items-center gap-2">
      <p-checkbox
  binary="true"
  formControlName="isSaveAsTemplate"
  (onChange)="SaveAsTemplate($event)">
</p-checkbox>

      <label class="cursor-pointer select-none">
        Save as template in this profile
      </label>
    </div>

    <!-- RIGHT -->
    <div class="flex flex-col sm:flex-row justify-end gap-2">
      <p-button label="Search" icon="pi pi-search" (click)="onSearch()" styleClass="w-full sm:w-auto" />

      <p-button label="Clear" icon="pi pi-refresh" (click)="onClear()" styleClass="w-full sm:w-auto" />

      <p-button label="Cancel" icon="pi pi-ban" (click)="onCancel()" severity="secondary" styleClass="w-full sm:w-auto" />
    </div>
  </div>

</form>
