<div
  class="p-4 bg-white rounded-lg shadow-md border"
  *ngIf="messages.length > 0"
>
  <ng-container *ngIf="isSuccess; else errorTemplate">
    <h2
      class="text-lg font-semibold text-green-700 mb-2 flex items-center gap-2"
    >
      <i class="pi pi-ellipsis-v text-green-500" style="font-size: 1.25rem"></i>
      <p class="text-green-800 text-sm leading-relaxed">
        {{ invoiceValidationHeader }} Action
      </p>
    </h2>
    <hr />
    <span class="p-3">
      <ng-container
        *ngFor="let msg of messages; let i = index; trackBy: trackByValue"
      >
        <i class="pi pi-check text-green-500"></i> {{ msg }}
        <ng-container *ngIf="i < messages.length - 1">, </ng-container>
      </ng-container>
    </span>
  </ng-container>
</div>

<ng-template #errorTemplate>
  <h2
    class="text-lg font-semibold border-bottom text-gray-700 mb-4 flex items-center gap-2"
  >
    <i class="pi pi-ellipsis-v text-red-500" style="font-size: 1.25rem"></i>
    <p class="text-gray-800 text-sm leading-relaxed">
      {{ invoiceValidationHeader }} Action
    </p>
  </h2>
  <hr />
  <span class="text-gray-800 text-sm leading-relaxed font-semibold">
    The invoice contains the following errors:
  </span>
  <div class="mt-2">
    <span class="p-3">
      <ng-container
        *ngFor="let msg of messages; let i = index; trackBy: trackByValue"
      >
        <i class="pi pi-times-circle text-red-500"></i> {{ msg }}
        <ng-container *ngIf="i < messages.length - 1">, </ng-container>
      </ng-container>
    </span>
  </div>
</ng-template>
