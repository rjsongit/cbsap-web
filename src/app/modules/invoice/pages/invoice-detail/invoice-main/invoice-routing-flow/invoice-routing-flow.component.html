  <form [formGroup]="invInfoRoutingLevelForm">
    <!-- Top Add Button -->
    <div class="flex justify-center mb-4 ml-4">
      <!-- <p-button
        severity="contrast"
        type="button"
        [rounded]="true"
        pTooltip="Add Role"
        class="w-[100px] text-white text-sm ml-6 mt-2"
        (click)="searchRole()"
        rounded="true"
        size="small"
      >
        <i class="pi pi-plus"></i>
      </p-button> -->
    </div>
     @if (routingFlowLevels.length == 0) {
          <div class="flex flex-col items-center w-full">
            <i class="pi pi-objects-column routing-flow-icon"></i>
            <div class="font-semibold text-100 pt-3">No Routing Flow Found</div>
            <div class="text-gray-500">Create a routing flow by adding role from the button below.</div>
            <div class="p-3">
              <p-button
                severity="primary"
                type="button"
                [rounded]="true"
                pTooltip="Add Role"
                (click)="searchRole()"
                rounded="true"
                size="small"><i class="pi pi-plus"></i> Add Role</p-button>
            </div>
          </div>
        }
    <div *ngIf="routingFlowLevels.length > 0" class="w-[300px] mx-auto text-sm">
      <label class="block mt-1"></label>

      <div class="space-y-4 mt-2" formArrayName="invInfoRoutingLevels">
       
        <div 
          *ngFor="let level of routingFlowLevels.controls; let i = index"
          [formGroupName]="i"
          class="flex flex-col items-center w-full">
          <div  class="flex justify-between p-3 flow-level w-full gap-3"  [class.current-flow-level]="level.value.flowStatus===FlowStatus.Assigned" [class.submitted-level]="level.value.flowStatus===FlowStatus.Submitted">
           <div class="flex items-center">
              <!-- show check icon for current level, otherwise file icon -->
              <p-avatar shape="circle" size="large"  class="avatar-with-check">                
                <ng-container>
                  <i class="pi pi-user"></i>
                </ng-container>      
                @if (level.value.flowStatus === FlowStatus.Submitted){
                  <i class="pi pi-check check-icon"></i>          
                }
              </p-avatar>
            </div>
            <div class="flex-1">
              <div class="font-semibold">
                {{ getRoleName(level.value.roleID!) }}
              </div>
              <small class="text-gray-500">Level {{ level.value.level }}</small>
            </div>
            <button
              (click)="removeLevel(i)"
              class="text-gray-600 text-sm flex items-center ml-4"
              pTooltip="Remove Role"
              *ngIf="routingFlowLevels.length !== 1"
            >
              <i class="pi pi-times"></i>
            </button>
          </div>

          <div class="flex items-center justify-center mt-2">
            <p-button
              severity="secondary"
              icon="pi pi-plus"
              type="button"
             
             
              pTooltip="Add Role"
              (click)="searchRole(i + 1)"
              size="small"
            >
             
            </p-button>
          </div>
        </div>
      </div>
    </div>
