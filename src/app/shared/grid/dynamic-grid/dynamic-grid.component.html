<p-table
  [value]="config?.data ?? []"
  [columns]="config?.columns"
  [lazy]="true"
  (onLazyLoad)="loadData($event)"
  [scrollable]="true"
  scrollHeight="400px"
  [totalRecords]="config?.totalRecords ?? 0"
  [rowHover]="true"
  [paginator]="true"
  [rows]="10"
  [loading]="config?.loading"
  [sortField]="sortField"
  [sortOrder]="sortOrder"
  [rowsPerPageOptions]="[5, 10, 25]"
  [tableStyle]="tableStyle"
  styleClass="p-datatable-sm p-datatable-striped p-datatable-header-bgwhite"
  size="small"
>
  <ng-template pTemplate="header" let-columns>
    <tr>
      <th *ngIf="config?.actions">Actions</th>
      <th
        *ngFor="let col of columns ?? []"
        [pSortableColumn]="col.field"
        [pSortableColumnDisabled]="!col.sort"
      >
        {{ col.header }}
        <p-sortIcon
          [field]="col.field"
          [ngClass]="{ hidden: !col.sort }"
          pTooltip="Sort by {{ col.header }}"
          tooltipPosition="top"
        >
         <i class="p-sortable-column-icon pi pi-sort"></i>
      </p-sortIcon>
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-rowData let-columns="columns">
    <tr
      *ngFor="let rowFig of config?.rowClick"
      (click)="rowFig.allow && rowFig?.clickable(rowData)"
    >
      <td *ngIf="config?.actions" (click)="stopPropagation($event)">
        <button
          *ngFor="let action of config?.actions!"
          (click)="action.action(rowData)"
        >
          <i *ngIf="action.icon" class="pi {{ action.icon }}"></i>
          {{ action.label }}
        </button>
      </td>
      <td *ngFor="let col of columns" [ngClass]="{ 'word-wrap': col.wrap }">
        <ng-container [ngSwitch]="col.type">
          <ng-container *ngSwitchCase="'custom'">
            <ng-container
              *ngTemplateOutlet="
                col.customTemplate;
                context: { $implicit: rowData }
              "
            ></ng-container>
          </ng-container>
          <ng-container *ngSwitchCase="'tag'">
            <ng-container *ngIf="col.pipe === 'yesno'">
              <p-tag
                [value]="rowData[col.field] | yesno"
                [severity]="rowData[col.field] ? 'success' : 'danger'"
              ></p-tag>
            </ng-container>
          </ng-container>
          <ng-container *ngSwitchDefault>
            {{ rowData[col.field] }}
          </ng-container>
        </ng-container>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td [attr.colspan]="(config?.columns)!.length + 1">
        <div
          class="flex justify-center items-center text-gray-500 font-semibold"
        >
          No record found.
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
