<div class="card">
  <h5 class="text-lg font-semibold mb-4">Search</h5>
  <div class="grid grid-cols-1 md:grid-cols-1 gap-4">
    <div class="flex w-full items-center mt-5 sm:mt-0 gap-2">
      <div class="flex flex-wrap gap-4 w-full sm:w-4/5 items-center">
        <div class="flex flex-col w-full sm:w-1/3">
          <label for="supplierID" class="block font-bold mb-2"
            >Supplier No</label
          >
          <input
            pInputText
            id="supplierID"
            [(ngModel)]="filterBySupplierID"
            type="text"
            class="w-full border rounded-md px-3 py-2"
          />
        </div>
        <div class="flex flex-col w-full sm:w-1/3">
          <label for="supplierName" class="block font-bold mb-2"
            >Supplier Name</label
          >
          <input
            pInputText
            id="supplierName"
            [(ngModel)]="filterBySupplierName"
            type="text"
            class="w-full border rounded-md px-3 py-2"
          />
        </div>

        <div
          class="flex flex-wrap w-full sm:w-auto gap-4 mt-6 sm:flex-row flex-col"
        >
          <p-button
            label="Search"
            [rounded]="true"
            icon="pi pi-search"
            (click)="search()"
          />
          <p-button
            label="Clear"
            [rounded]="true"
            icon="pi pi-refresh"
            (click)="clear()"
          />
        </div>
      </div>
    </div>
  </div>
</div>
<div class="card user-card mt-6" *ngIf="isShowSearchSupplier">
  <app-dynamic-grid
    (load)="onLazyLoad($event)"
    [config]="gridConfig"
    [tableStyle]="{ 'min-width': '60rem' }"
  ></app-dynamic-grid>
</div>
