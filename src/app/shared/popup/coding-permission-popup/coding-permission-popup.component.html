<!-- filter fields -->
<div class="card">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
            <label for="entity" class="block font-bold mb-2">Entity</label>
            @if (entityList.length === 1) {
                <input 
                    type="text" 
                    value="{{this.entityList[0].entityName}}" 
                    class="border rounded p-2" 
                    readonly />
            }
            @else {
                <p-select 
                    [options]="entityList" 
                    [(ngModel)]="selectedEntity" 
                    optionLabel="entityName" 
                    optionValue="entityProfileID"
                    placeholder="Select an entity" 
                    class="w-full md:w-56" />
            }
        </div>
        <div>
            <label for="category" class="block font-bold mb-2">Category</label>
            @if (categoryList.length === 1) {
                <input 
                    type="text" 
                    value="{{this.categoryList[0].categoryName}}" 
                    class="border rounded p-2" 
                    readonly />
            }
            @else {
                <p-select 
                    [options]="categoryList"
                    [(ngModel)]="selectedCategory" 
                    optionLabel="categoryName"
                    optionValue="categoryID"
                    placeholder="Select a category" 
                    class="w-full md:w-56" />
            }
        </div>
        <div>
            <label for="filterbyNameCode" class="block font-bold mb-2">Name/Code</label>
            <input
                pInputText
                id="filterbyNameCode"
                [(ngModel)]="filterbyNameCode"
                type="text"
                class="w-full border rounded-md px-3 py-2" />
        </div>
    </div>

    <!-- Search Button -->
    <div class="flex justify-end mt-4">
      <p-button [raised]="true"
                type="button"
                label="Search"
                [rounded]="true"
                (click)="searchFilter()"
                severity="primary"
      ></p-button>
    </div>
</div>

<!-- assigned, unassigned, save, cancel -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-2 pl-3 pr-3">
    <div class="field flex gap-4">
        <div class="field flex gap-4">
            <label for="{{ filterbyAssigned }}" >Assigned</label>
            <div class="flex text-right">
                <p-toggle-switch [(ngModel)]="filterbyAssigned" (ngModelChange)="onToggleChange()"/>
            </div>
        </div>

        <div class="field flex gap-4">
            <label for="{{ filterbyUnassigned }}" >Unassigned</label>
            <div class="flex text-right">
                <p-toggle-switch [(ngModel)]="filterbyUnassigned" (ngModelChange)="onToggleChange()"/>
            </div>
        </div>
    </div>
    <div class="field flex justify-end gap-2">
        <div class="flex justify-end gap-2 lg:mb-3">
            <p-button label="Save" severity="danger" icon="pi pi-check" [rounded]="true" (click)="saveAndClose()" />
            <p-button label="Cancel" severity="secondary" icon="pi pi-times" [rounded]="true" (click)="closeDialog()" />
        </div>
    </div>
</div>

<!-- selection list -->
    <div class="border border-gray-300 rounded-md pl-2 pr-2 pt-2 pb-2 min-h-[250px] flex flex-col justify-between bg-white">
        
        <!-- multi-Column Selection Layout List -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-60 overflow-y-auto p-1">
            @if (permissionFiltered.length > 0) {
                @for (item of permissionFiltered; track item.id) {
                    <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded transition-colors duration-150 border-b border-gray-100 last:border-0">
                        <label [for]="'lbl-' + item.id" class="cursor-pointer text-sm font-medium text-gray-700 select-none pr-2">
                            {{ item.nameCode }}
                        </label>
                        <p-checkbox 
                            [(ngModel)]="item.checked" 
                            [binary]="true" 
                            [inputId]="'lbl-' + item.id" />
                    </div>
                }
            } @else {
                <div class="col-span-full text-center text-gray-400 py-12 text-sm">
                    No matching permissions values returned based on search parameters.
                </div>
            }
        </div>

        <!-- Bottom Action Sub-Panel Utilities -->
        <div class="flex justify-end gap-2 mt-2 pt-2 border-t border-gray-200">
            <p-button label="Select All" severity="danger" [rounded]="true" (click)="setAllSelectionStates(true)" />
            <p-button label="Unselect All" severity="secondary" [rounded]="true" (click)="setAllSelectionStates(false)" />
        </div>
    </div>
